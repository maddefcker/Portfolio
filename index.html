<!DOCTYPE html>
<html>
    <head>
        <meta charset = "UTF-8">
        <link rel="stylesheet"href="style.css">
        <meta name ="viewport"content="width-device-width, initial scale=1.0">
        <title>Madeleine</title>
        <!--Fonts & favicon-->
        <link rel ="icon"type="image/star"href="icons/star.png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Red+Rose:wght@300..700&family=Unbounded:wght@200..900&display=swap" rel="stylesheet">
    </head>
    <body>   
        <!--startsida-->
    <div class="desktop">
        <div class="icon-container">
            <!--Lägg in desktop ikoner/program-->
            <img src="icons/folder.png"alt="folder">
            <p>About me</p>
        </div>
        <div class="window-container">
            <div class="titlebar">
                About me
                <button class="close">X</button>
            </div>
            <div class="content-container">
                Hello
            </div>
        </div>

        <div class="navbar">
            <button id="home">Home</button>
        </div>

        <div class="start-menu" id="start-menu">
            <button data-window="about me">About me</button>
            <button data-window="findme">Find me</button>
            <button data-window="projects">Projects</button>
            <button data-window="contact">Contact</button>
            <button data-window="references">References</button>
        </div>

            <!--Stickers-->
            <img src="stickers/camera.png"class="sticker"alt="camera">
    </div>

    <!--Popup window-->
    <div class="cv">
        Download CV
    </div>
    
    </body>
</html>
